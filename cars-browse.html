    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0A0E27;
            --bg-darker: #050815;
            --accent: #00E5FF;
            --accent-secondary: #FF3D00;
            --text: #FFFFFF;
            --text-secondary: #B0B8C1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-darker);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            flex: 1;
            max-width: 500px;
            margin: 0 3rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 50px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Brands Section */
        .brands-section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 30px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 10px;
        }

        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .brand-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .brand-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .brand-card:hover::before {
            opacity: 1;
        }

        .brand-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.3);
        }

        .brand-card.active {
            border-color: var(--accent);
            background: rgba(0, 229, 255, 0.1);
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 0.8rem;
            filter: brightness(1.1) contrast(1.1);
            transition: all 0.3s;
        }

        .brand-card:hover .brand-logo {
            filter: brightness(1.3) contrast(1.2);
            transform: scale(1.05);
        }

        .brand-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        .brand-count {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* Cars Grid */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .car-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
        }

        .car-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 60px rgba(0, 229, 255, 0.3);
        }

        .car-image-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.05), rgba(255, 61, 0, 0.05));
            overflow: hidden;
        }

        .car-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }

        .car-card:hover .car-image {
            transform: scale(1.1);
        }

        .badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 229, 255, 0.9);
            color: #000;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.new {
            background: linear-gradient(135deg, #00E5FF, #FF3D00);
        }

        .car-details {
            padding: 1.5rem;
        }

        .car-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .car-price {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .car-specs {
            display: flex;
            gap: 1.5rem;
            padding: 1rem 0;
            border-top: 1px solid rgba(0, 229, 255, 0.1);
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            margin-bottom: 1rem;
        }

        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .spec-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .spec-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .car-features {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .feature-tag {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .car-cta {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(0, 229, 255, 0.1);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);

                gap: 1rem;
            }

            .cars-grid {
                grid-template-columns: 1fr;
            }

            .search-bar {
                margin: 1rem 0;
            }

            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>

        let currentBrand = null;
        let allCars = [];

        // Initialize
        function init() {
            renderBrands();
            setupSearch();
        }

        // Render Brands
        function renderBrands() {
            const brandsGrid = document.getElementById('brandsGrid');
            brandsGrid.innerHTML = '';

            Object.keys(carDatabase).forEach(brandKey => {
                const brand = carDatabase[brandKey];
                const brandCard = document.createElement('div');
                brandCard.className = 'brand-card';
                brandCard.onclick = () => selectBrand(brandKey);
                
                brandCard.innerHTML = `
                    <img src="${brand.logo}" 
                         alt="${brand.name}" 
                         class="brand-logo"
                         loading="lazy">
                    <div class="brand-name">${brand.name}</div>
                    <div class="brand-count">${brand.cars.length} models</div>
                `;
                
                brandsGrid.appendChild(brandCard);
            });
        }

        // Select Brand
        function selectBrand(brandKey) {
            currentBrand = brandKey;
            const brand = carDatabase[brandKey];
            
            // Update active brand
            document.querySelectorAll('.brand-card').forEach((card, index) => {
                card.classList.remove('active');
                if (Object.keys(carDatabase)[index] === brandKey) {
                    card.classList.add('active');
                }
            });

            // Show cars
            document.getElementById('carsTitle').style.display = 'flex';
            document.getElementById('brandTitle').textContent = brand.name;
            document.getElementById('carCount').textContent = brand.cars.length;
            
            renderCars(brand.cars);
        }

        // Render Cars
        function renderCars(cars) {
            const carsGrid = document.getElementById('carsGrid');
            carsGrid.innerHTML = '';
            carsGrid.style.opacity = '0';

            setTimeout(() => {
                cars.forEach(car => {
                    const carCard = createCarCard(car);
                    carsGrid.appendChild(carCard);
                });
                carsGrid.style.opacity = '1';
            }, 100);
        }

        // Create Car Card
        function createCarCard(car) {
            const card = document.createElement('div');
            card.className = 'car-card';
            
            card.innerHTML = `
                <div class="car-image-container">
                    <img src="${car.image}" alt="${car.name}" class="car-image">
                    ${car.new ? '<div class="badge new">2026 New</div>' : ''}
                </div>
                <div class="car-details">
                    <div class="car-name">${car.name}</div>
                    <div class="car-price">${car.price}</div>
                    <div class="car-specs">
                        <div class="spec-item">
                            <div class="spec-label">Fuel</div>
                            <div class="spec-value">${car.fuel}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Seats</div>
                            <div class="spec-value">${car.seating}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Type</div>
                            <div class="spec-value">${car.type}</div>
                        </div>
                    </div>
                    <div class="car-features">
                        ${car.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}
                    </div>
                    <div class="car-cta">
                        <button class="btn btn-primary" onclick="alert('View 360° coming soon!')">View 360°</button>
                        <button class="btn btn-secondary" onclick="alert('Compare feature coming soon!')">Compare</button>
                    </div>
                </div>
            `;
            
            return card;
        }

        // Search Functionality
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                
                if (query.length === 0) {
                    if (currentBrand) {
                        renderCars(carDatabase[currentBrand].cars);
                    }
                    return;
                }

                // Search all cars
                let results = [];
                Object.keys(carDatabase).forEach(brandKey => {
                    const brand = carDatabase[brandKey];
                    const matchedCars = brand.cars.filter(car => 
                        car.name.toLowerCase().includes(query) ||
                        car.type.toLowerCase().includes(query) ||
                        car.fuel.toLowerCase().includes(query) ||
                        brand.name.toLowerCase().includes(query)
                    );
                    results = results.concat(matchedCars);
                });

                document.getElementById('carsTitle').style.display = 'flex';
                document.getElementById('brandTitle').textContent = 'Search Results';
                document.getElementById('carCount').textContent = results.length;
                
                if (results.length > 0) {
                    renderCars(results);
                } else {
                    document.getElementById('carsGrid').innerHTML = '<div class="empty-state"><h3>No cars found</h3><p>Try a different search term</p></div>';
                }
            });
        }

        // Initialize on load
        init();
    </script>
